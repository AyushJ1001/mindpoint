                - heading "Want real skills — not just another certificate?" [level=1] [ref=e82]
                - paragraph [ref=e83]:
                  - text: Rational Emotive Behavioural Therapy
                  - generic [ref=e84]: This course provides a structured and practical understanding of Rational Emotive Behavior Therapy (REBT), a pioneering form of cognitive-behavioral therapy developed by Dr. Albert Ellis. You will learn the theoretical foundations, including the ABC Model, the distinction between rational and irrational beliefs, and the link between thoughts, emotions, and behaviors. The program equips you with hands-on techniques for disputing irrational beliefs, restructuring cognition, and creating behavioral change. Through case studies, role-plays, and real-world applications, you will gain the skills to effectively apply REBT in both straightforward and complex clinical situations, as well as integrate it with other therapeutic approaches.
